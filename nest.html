<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Island Nests | RedditLite 🦖</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1b; color: #d7dadc; margin: 0; padding: 0; }
        nav { background: #272729; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #343536; }
        nav a { color: #d7dadc; text-decoration: none; margin: 0 15px; font-size: 14px; }
        
        .island-header { background: #1b4d3e; padding: 50px 20px; text-align: center; border-bottom: 1px solid #343536; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }

        /* Nest Card */
        .nest-card { 
            background: #272729; border: 1px solid #343536; padding: 20px; 
            border-radius: 8px; margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            text-decoration: none; color: inherit; transition: 0.2s;
        }
        .nest-card:hover { border-color: #818384; background: #2d2d30; transform: scale(1.01); }

        .nest-info h3 { margin: 0; color: #ff4500; font-family: monospace; } 
        .nest-info p { margin: 5px 0 0 0; font-size: 14px; color: #818384; }
        
        .visit-btn { background: #4bb543; color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        
        /* Build Nest Button */
        .create-nest-trigger { 
            border: 2px dashed #343536; padding: 30px; text-align: center; 
            border-radius: 8px; color: #818384; cursor: pointer; transition: 0.3s;
            margin-bottom: 30px;
        }
        .create-nest-trigger:hover { border-color: #4bb543; color: #d7dadc; background: #1d2a1d; }

        /* Modal Background */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #272729; padding: 30px; border-radius: 12px; width: 450px; border: 1px solid #343536; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1b; border: 1px solid #343536; color: white; border-radius: 6px; box-sizing: border-box; }
        .form-btn { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; margin-right: 20px;"><b>Reddit</b>Lite 🦖</div>
    <a href="index.html">Feed</a>
    <a href="islands.html">← Back to Islands</a>
</nav>

<div class="island-header">
    <h1 id="island-title" style="margin: 0;">Island Nests</h1>
    <p style="opacity: 0.8;">Explore and build community habitats.</p>
</div>

<div class="container">
    <div class="create-nest-trigger" onclick="toggleModal(true)">
        <span style="font-size: 24px;">🏗️</span><br>
        <b>Build a New Nest</b><br>
        <span style="font-size: 12px;">Let the community grow on this Island</span>
    </div>

    <div id="nest-container">
        <a href="index.html" class="nest-card">
            <div class="nest-info">
                <h3>n/GeneralHub</h3>
                <p>The main gathering spot for all members of this Island.</p>
            </div>
            <div class="visit-btn">Visit Nest</div>
        </a>
    </div>
</div>

<div id="nestModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0;">Establish a Nest</h2>
        <p style="font-size: 12px; color: #818384;">Give your group a name and a purpose.</p>
        
        <input type="text" id="nestName" placeholder="n/NestName (e.g. n/ProjectDino)">
        <textarea id="nestDesc" placeholder="What happens in this nest?"></textarea>
        
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button class="form-btn" onclick="toggleModal(false)" style="background:transparent; color:#818384;">Cancel</button>
            <button class="form-btn" onclick="addNewNest()" style="background:#4bb543; color:white;">Create Nest</button>
        </div>
    </div>
</div>

<script>
    function toggleModal(show) {
        document.getElementById('nestModal').style.display = show ? 'flex' : 'none';
    }

    function addNewNest() {
        const name = document.getElementById('nestName').value;
        const desc = document.getElementById('nestDesc').value;

        if (name && desc) {
            const container = document.getElementById('nest-container');
            const newCard = `
                <a href="index.html" class="nest-card">
                    <div class="nest-info">
                        <h3>${name.startsWith('n/') ? name : 'n/' + name}</h3>
                        <p>${desc}</p>
                    </div>
                    <div class="visit-btn">Visit Nest</div>
                </a>
            `;
            container.innerHTML = newCard + container.innerHTML; // Adds new nest to the top
            toggleModal(false);
            
            // Clear inputs
            document.getElementById('nestName').value = "";
            document.getElementById('nestDesc').value = "";
        } else {
            alert("Fill in both the name and description!");
        }
    }
</script>

</body>
</html>
