<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile & Join | Campusaurus</title>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/profile/style.css">
</head>
<body>
<nav>
    <div class="logo-text">Campusaurus🦖</div>
    <a href="/index.html">Base Camp</a>
    <a href="/announcements/index.html">Announcements</a>
    <a href="/islands/index.html">Islands</a>
    <div id="nav-auth-section" style="margin-left: auto; display: flex; align-items: center;">
        <a href="/login/index.html" style="text-decoration: none; color: var(--text-light); font-weight: bold;">Login</a>
        <a href="/register/index.html" style="text-decoration: none; color: var(--amber-accent); font-weight: bold; margin-left: 10px;">Register</a>
    </div>
    <a href="/create/index.html" class="create-btn">Log Discovery</a>
</nav>
<div class="breadcrumbs"><a href="/index.html">Base Camp</a> / <span>My Profile</span></div>
<div class="container">

    <!-- This is the inner auth/join section, separate from navbar -->
    <div id="auth-section" class="auth-box">
        <h2>Join the Archipelago</h2>
        <p>Pick your species and join your Island.</p>
        
        <form id="signup-form">
            <label>Choose Your Dino Species</label>
            <div class="avatar-container">
                <div class="avatar-option avatar-selected" onclick="selectAvatar('🦖', this)">🦖</div>
                <div class="avatar-option" onclick="selectAvatar('🦕', this)">🦕</div>
                <div class="avatar-option" onclick="selectAvatar('🐊', this)">🐊</div>
                <div class="avatar-option" onclick="selectAvatar('🐢', this)">🐢</div>
                <div class="avatar-option" onclick="selectAvatar('🦎', this)">🦎</div>
            </div>
            <input type="hidden" id="selected-avatar" value="🦖">

            <label>Username</label>
            <input type="text" id="username" required>

            <label>Student Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Age</label>
                    <input type="number" id="age" min="16" required>
                </div>
                <div style="flex: 1;">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <label>Assigned Island</label>
            <select id="dept">
                <option value="CCS">CCS Island</option>
                <option value="CEA">CEA Island</option>
                <option value="CHS">CHS Island</option>
                <option value="CTHBM">CTHBM Island</option>
                <option value="CTDE">CTDE Island</option>
                <option value="CAS">CAS Island</option>
            </select>

            <label>Year Level</label>
            <select id="year">
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>

            <button type="submit" id="submit-btn" class="btn-join">Verify & Evolve</button>
        </form>
    </div>

    <div id="user-profile">
        <div id="display-dino" style="font-size: 60px; margin-bottom: 10px;">🦖</div>
        <h1 id="display-username" style="margin: 0;">u/username</h1>
        <p id="display-email" style="color: #818384; margin-top: 5px; margin-bottom: 20px;">email@student.edu</p>
        
        <div>
            <span class="user-badge" id="display-dept">Island</span>
            <span class="user-badge" id="display-year">Year</span>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #343536; margin: 30px 0;">
        
        <h3>Your Activity</h3>
        <p style="color: #818384; font-size: 14px;" id="stat-wordle">Total Wordle Wins: 0</p>
        <p style="color: #818384; font-size: 14px;" id="stat-posts">Posts Created: 0</p>
        
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script type="module" src="/profile/script.js"></script>
<script type="module" src="/nav.js"></script>

</body>
</html>
