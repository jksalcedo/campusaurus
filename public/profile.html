<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile & Join | RedditLite 🦖</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1b; color: #d7dadc; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; }
        
        /* Auth Card */
        .auth-box { background: #272729; padding: 30px; border-radius: 8px; border: 1px solid #343536; }
        .auth-box h2 { margin-top: 0; font-size: 22px; text-align: center; }
        .auth-box p { font-size: 14px; color: #818384; text-align: center; margin-bottom: 25px; }
        
        /* Form Styling */
        label { display: block; font-size: 11px; font-weight: bold; color: #818384; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #1a1a1b; border: 1px solid #343536; color: white; padding: 10px; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #d7dadc; }

        /* Dino Avatar Picker */
        .avatar-container { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; background: #1a1a1b; padding: 15px; border-radius: 8px; border: 1px solid #343536; }
        .avatar-option { font-size: 30px; cursor: pointer; padding: 10px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; }
        .avatar-option:hover { background: #343536; }
        .avatar-selected { border-color: #4bb543; background: #2e4a3d; }

        .btn-join { background: #d7dadc; color: #1a1a1b; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        .btn-join:hover { background: #ffffff; transform: scale(1.02); }
        .btn-join:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Profile View */
        #user-profile { display: none; background: #272729; padding: 30px; border-radius: 8px; border: 1px solid #343536; text-align: center; }
        .user-badge { background: #3d3d3f; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin: 0 5px; font-weight: bold; }
        
        .logout-btn { background: none; border: 1px solid #ff4500; color: #ff4500; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <nav style="margin-bottom: 20px;">
        <a href="index.html" style="color: #818384; text-decoration: none; font-size: 14px;">← Back to Home Feed</a>
    </nav>

    <div id="auth-section" class="auth-box">
        <h2>Join the Archipelago</h2>
        <p>Pick your species and join your Island.</p>
        
        <form id="signup-form">
            <label>Choose Your Dino Species</label>
            <div class="avatar-container">
                <div class="avatar-option avatar-selected" onclick="selectAvatar('🦖', this)">🦖</div>
                <div class="avatar-option" onclick="selectAvatar('🦕', this)">🦕</div>
                <div class="avatar-option" onclick="selectAvatar('🐊', this)">🐊</div>
                <div class="avatar-option" onclick="selectAvatar('🐢', this)">🐢</div>
                <div class="avatar-option" onclick="selectAvatar('🦎', this)">🦎</div>
            </div>
            <input type="hidden" id="selected-avatar" value="🦖">

            <label>Username</label>
            <input type="text" id="username" required>

            <label>Student Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Age</label>
                    <input type="number" id="age" min="16" required>
                </div>
                <div style="flex: 1;">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <label>Assigned Island</label>
            <select id="dept">
                <option value="CCS">CCS Island</option>
                <option value="CEA">CEA Island</option>
                <option value="CHS">CHS Island</option>
                <option value="CTHBM">CTHBM Island</option>
                <option value="CTDE">CTDE Island</option>
                <option value="CAS">CAS Island</option>
            </select>

            <label>Year Level</label>
            <select id="year">
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>

            <button type="submit" id="submit-btn" class="btn-join">Verify & Evolve</button>
        </form>
    </div>

    <div id="user-profile">
        <div id="display-dino" style="font-size: 60px; margin-bottom: 10px;">🦖</div>
        <h1 id="display-username" style="margin: 0;">u/username</h1>
        <p id="display-email" style="color: #818384; margin-top: 5px; margin-bottom: 20px;">email@student.edu</p>
        
        <div>
            <span class="user-badge" id="display-dept">Island</span>
            <span class="user-badge" id="display-year">Year</span>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #343536; margin: 30px 0;">
        
        <h3>Your Activity</h3>
        <p style="color: #818384; font-size: 14px;" id="stat-wordle">Total Wordle Wins: 0</p>
        <p style="color: #818384; font-size: 14px;" id="stat-posts">Posts Created: 0</p>
        
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script type="module">
    import { CampusaurusAPI } from './api.js';

    let chosenEmoji = '🦖';

    // Make avatar selection global so HTML can call it
    window.selectAvatar = function(emoji, element) {
        document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('avatar-selected'));
        element.classList.add('avatar-selected');
        chosenEmoji = emoji;
        document.getElementById('selected-avatar').value = emoji;
    };

    // Check login status on page load
    window.addEventListener('load', async () => {
        try {
            const user = await CampusaurusAPI.me();
            if (user) {
                // If logged in, fetch extra stats and show profile
                const stats = await CampusaurusAPI.wordle.stats().catch(() => ({ totalWins: 0 }));
                updateProfileUI(user, stats);
            }
        } catch (err) {
            console.log("Not logged in.");
        }
    });

    // Handle Form Submission
    document.getElementById('signup-form').onsubmit = async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const bio = `Department: ${document.getElementById('dept').value}, Year: ${document.getElementById('year').value}`;

        try {
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            // 1. Register user
            await CampusaurusAPI.auth.register(email, password, username);
            
            // 2. Login immediately
            const loginData = await CampusaurusAPI.auth.login(email, password);
            
            // 3. Save the chosen dino and bio details to the profile
            await CampusaurusAPI.profile.update({ 
                username: username,
                bio: bio,
                avatarUrl: chosenEmoji 
            });

            updateProfileUI(loginData);
            alert("Account created! Welcome to the Archipelago.");

        } catch (error) {
            console.error("Signup error:", error);
            alert(error.message || "An error occurred during signup.");
        } finally {
            submitBtn.innerText = "Verify & Evolve";
            submitBtn.disabled = false;
        }
    };

    // UI Update Helper
    function updateProfileUI(userData, wordleStats = { totalWins: 0 }) {
        document.getElementById('display-username').innerText = "u/" + (userData.username || "Student");
        document.getElementById('display-email').innerText = userData.email || "";
        
        // Use saved avatar if available, otherwise use current selection
        document.getElementById('display-dino').innerText = userData.avatarUrl || chosenEmoji;
        
        // Pull dept/year from inputs for now as a fallback
        document.getElementById('display-dept').innerText = document.getElementById('dept').value;
        document.getElementById('display-year').innerText = document.getElementById('year').value;

        // Update stats from the API
        document.getElementById('stat-wordle').innerText = `Total Wordle Wins: ${wordleStats.totalWins}`;

        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
    }

    // Global Logout function
    window.logout = async function() {
        try {
            await CampusaurusAPI.auth.logout();
            location.reload(); // Refresh to reset UI state
        } catch (error) {
            alert("Logout failed: " + error.message);
        }
    };
</script>

</body>
</html>
