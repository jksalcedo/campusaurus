<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Camp | Campusaurus</title>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/index/style.css">
</head>
<body>
<nav>
    <div class="logo-text">Campusaurus🦖</div>
    <a href="/index.html" class="active">Base Camp</a>
    <a href="/announcements/index.html">Announcements</a>
    <a href="/islands/index.html">Islands</a>
    <a href="/profile/index.html" style="margin-left: auto;">My Profile</a>
    <a href="/create/index.html" class="create-btn">Log Discovery</a>
</nav>

<div class="container">
    <div class="feed">
        <h2 class="section-title" id="feed-title">Latest Finds</h2>
        <div id="feed-container">
            <p style="color: var(--text-muted); font-style: italic;">Connecting to radar...</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="side-box">
            <div class="side-title">Live Chat</div>
            <div class="chat-area" id="chat-area">
            </div>
            <input type="text" id="chat-input" class="chat-input" placeholder="Roar something... (Press Enter)">
        </div>

        <a href="/wordle/index.html" style="text-decoration: none; color: inherit; display: block;">
            <div class="side-box interactive-box">
                <div class="side-title">Daily Wordle</div>
                <div class="wordle-grid">
                    <div class="tile correct">W</div><div class="tile">O</div><div class="tile">R</div><div class="tile">L</div><div class="tile">D</div>
                    <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
                </div>
                <p style="font-size: 12px; text-align: center; margin-top: 15px; color: var(--text-muted);">TAP TO PLAY</p>
            </div>
        </a>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Update Field Notes</h2>
        <textarea id="editContent" rows="5" placeholder="Revise your discovery..."></textarea>
        <div class="modal-actions">
            <button class="stat-btn" onclick="closeEditModal()">Cancel</button>
            <button class="stat-btn btn-save" id="saveEditBtn">Save Changes</button>
        </div>
    </div>
</div>

<script src="/index/script.js"></script>

</body>
</html>
