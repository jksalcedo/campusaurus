<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Discovery | Campusaurus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');

        :root {
            --font-heading: 'Oswald', sans-serif;
            --font-body: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            --bg-deep-jungle: #161c16;
            --bg-foliage: #222d22;
            --bg-card: #2a362a;
            --border-moss: #3a4a3a;
            --text-light: #e0e6dd;
            --text-muted: #a4b3a4;
            --amber-accent: #e5a93d;
            --amber-hover: #ffbe4d;
        }

        body { 
            font-family: var(--font-body); 
            background: var(--bg-deep-jungle); 
            color: var(--text-light); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        h1, h2, .logo-text { font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        /* Navbar */
        nav { background: var(--bg-foliage); padding: 15px 30px; display: flex; gap: 25px; align-items: center; border-bottom: 2px solid var(--border-moss); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        nav a { color: var(--text-muted); text-decoration: none; font-weight: bold; transition: color 0.2s; font-size: 15px; }
        nav a:hover { color: var(--amber-accent); }
        .logo-text { font-size: 24px; color: var(--amber-accent); margin-right: 20px; }

        /* Main Container */
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; width: 100%; box-sizing: border-box; }
        .back-link { color: var(--text-muted); text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; transition: color 0.2s; }
        .back-link:hover { color: var(--amber-accent); }

        .form-card { 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid var(--border-moss); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .form-header { border-bottom: 2px solid var(--border-moss); padding-bottom: 15px; margin-bottom: 30px; }
        .form-header h1 { font-size: 28px; color: var(--amber-accent); }
        
        /* Inputs */
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        
        input[type="text"], textarea, select { 
            width: 100%; 
            background: var(--bg-deep-jungle); 
            border: 2px solid var(--border-moss); 
            color: var(--text-light); 
            font-size: 16px;
            padding: 14px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--amber-accent);
            box-shadow: 0 0 10px rgba(229, 169, 61, 0.2);
            background: #1a221a;
        }

        /* Submit Button */
        .btn-submit { 
            background: var(--amber-accent); 
            color: var(--bg-deep-jungle); 
            border: none; 
            padding: 14px 30px; 
            font-weight: bold; 
            font-size: 16px;
            font-family: var(--font-heading);
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.2s;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .btn-submit:hover { background: var(--amber-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(229, 169, 61, 0.3); }
        .btn-submit:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo-text">Campusaurus🦖</div>
    <a href="index.html">Base Camp</a>
    <a href="announcements.html">Announcements</a>
    <a href="islands.html">Islands</a>
    <a href="profile.html" style="margin-left: auto;">My Profile</a>
</nav>

<div class="container">
    <a href="index.html" class="back-link">← Return to Base Camp</a>

    <div class="form-card">
        <div class="form-header">
            <h1>Log New Discovery</h1>
        </div>
        
        <form id="create-post-form">
            
            <div class="form-group">
                <label for="category">EXCAVATION ZONE (SCOPE)</label>
                <select id="category" required>
                    <option value="world">🌍 Pangaea (World - All CSPC)</option>
                    <option value="island">🏝️ Island (Department Level)</option>
                    <option value="nest">🪹 Nest (Class/Community Level)</option>
                    <option value="hunt">🍖 The Hunt (Looking For...)</option>
                    <option value="announcement">📢 Amber Alert (Announcement)</option>
                </select>
            </div>

            <div class="form-group" id="specific-zone-container" style="display: none;">
                <label for="specificZone" id="specificZoneLabel">SPECIFIC ZONE NAME</label>
                <input type="text" id="specificZone" placeholder="e.g., CCS Island or n/ProjectDino">
            </div>

            <div class="form-group">
                <label for="title">SPECIMEN LOG (TITLE)</label>
                <input type="text" id="title" placeholder="What did you unearth today?" required>
            </div>

            <div class="form-group">
                <label for="content">FIELD NOTES (CONTENT)</label>
                <textarea id="content" rows="8" placeholder="Detail your findings... (optional)"></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">PUBLISH RECORD</button>
        </form>
    </div>
</div>

<script type="module">
    import { CampusaurusAPI } from './api.js';

    // Show/Hide the specific zone input based on dropdown selection
    const categorySelect = document.getElementById('category');
    const specificZoneContainer = document.getElementById('specific-zone-container');
    const specificZoneLabel = document.getElementById('specificZoneLabel');

    categorySelect.addEventListener('change', (e) => {
        const val = e.target.value;
        if (val === 'island') {
            specificZoneContainer.style.display = 'block';
            specificZoneLabel.innerText = "WHICH ISLAND?";
        } else if (val === 'nest') {
            specificZoneContainer.style.display = 'block';
            specificZoneLabel.innerText = "WHICH NEST?";
        } else {
            specificZoneContainer.style.display = 'none';
        }
    });

    // Handle Form Submission
    document.getElementById('create-post-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "EXCAVATING...";
        submitBtn.disabled = true;

        let categoryId = document.getElementById('category').value;
        const specificZone = document.getElementById('specificZone').value;
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;

        if ((categoryId === 'island' || categoryId === 'nest') && specificZone) {
            categoryId = `${categoryId}:${specificZone}`;
        }

        try {
            if (categoryId === 'announcement') {
                await CampusaurusAPI.announcements.create({
                    title: title,
                    body: content 
                });
                alert("Amber Alert Broadcasted Successfully!");
                window.location.href = "announcements.html"; 
            } else {
                await CampusaurusAPI.posts.create({
                    title: title,
                    content: content,
                    categoryId: categoryId
                });
                alert("Discovery logged successfully!");
                window.location.href = "index.html"; 
            }
        } catch (error) {
            console.error(error);
            alert("Failed to log discovery. System error: " + error.message);
        } finally {
            submitBtn.innerText = "PUBLISH RECORD";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
