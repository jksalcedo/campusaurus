<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Announcements | Campusaurus</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1b; color: #d7dadc; margin: 0; padding: 0; }
        nav { background: #272729; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #343536; position: sticky; top: 0; z-index: 100; }
        nav a { color: #d7dadc; text-decoration: none; margin: 0 10px; font-size: 14px; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .header-box { background: #272729; padding: 20px; border-radius: 5px; border: 1px solid #343536; margin-bottom: 20px; border-left: 5px solid #4bb543; }
        
        .post-card { background: #272729; padding: 15px; border-radius: 5px; border: 1px solid #343536; margin-bottom: 15px; }
        .post-meta { font-size: 12px; color: #818384; margin-bottom: 8px; }
        .post-title { margin: 0 0 10px 0; font-size: 18px; color: #d7dadc; }
        .post-content { font-size: 14px; color: #b1b3b5; line-height: 1.5; }
        .badge { background: #4bb543; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; vertical-align: middle; margin-left: 10px; }

        /* Empty / loading */
        .state {
            background: #272729;
            padding: 15px;
            border-radius: 5px;
            border: 1px dashed #343536;
            color: #818384;
            font-size: 14px;
        }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; margin-right: 20px;"><b>Campusaurus</b>🦖</div>
    <a href="index.html">← Back to Feed</a>
    <a href="profile.html" style="margin-left: auto;">My Profile</a>
</nav>

<div class="container">
    <div class="header-box">
        <h1 style="margin: 0;">📢 Official Announcements</h1>
        <p style="color: #818384; margin: 5px 0 0 0;">Stay updated with the latest news from the Admins.</p>
    </div>

    <div id="announcements" class="state">Loading announcements…</div>
</div>

<script type="module">
    import { CampusaurusAPI } from './api.js';

    function escapeHtml(str) {
        return String(str)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderEmpty(el) {
        el.className = 'state';
        el.textContent = 'No announcements yet.';
    }

    function renderAnnouncements(el, announcements) {
        if (!Array.isArray(announcements) || announcements.length === 0) {
            renderEmpty(el);
            return;
        }

        el.className = '';
        el.innerHTML = announcements.map(a => {
            const author = escapeHtml(a.author ?? 'Admin');
            const title = escapeHtml(a.title ?? 'Announcement');
            const content = escapeHtml(a.content ?? '');
            const createdAt = escapeHtml(a.createdAt ?? '');
            const badge = escapeHtml(a.badge ?? 'Official');

            return `
                <div class="post-card">
                    <div class="post-meta">Posted by <b>${author}</b>${createdAt ? ` • ${createdAt}` : ''} <span class="badge">${badge}</span></div>
                    <h2 class="post-title">${title}</h2>
                    <p class="post-content">${content}</p>
                </div>
            `;
        }).join('');
    }

    async function loadAnnouncements() {
        const el = document.getElementById('announcements');

        try {
            const data = await CampusaurusAPI.announcements.list();
            renderAnnouncements(el, data.announcements);
        } catch (err) {
            el.className = 'state';
            el.textContent = 'Could not load announcements.';
            console.error(err);
        }
    }

    loadAnnouncements();
</script>

</body>
</html>
