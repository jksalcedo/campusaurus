<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Topic Wordle | Class Forum</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1b; color: #d7dadc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        nav { width: 100%; max-width: 1200px; margin-bottom: 20px; display: flex; gap: 20px; }
        nav a { color: #818384; text-decoration: none; font-size: 14px; }

        .game-container { background: #272729; padding: 30px; border-radius: 10px; border: 1px solid #343536; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .topic-header { color: #818384; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        h1 { margin: 0 0 20px 0; font-size: 28px; }

        .grid { display: grid; grid-template-rows: repeat(6, 0.5fr); gap: 10px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 0.5fr); gap: 10px; }
        .tile {
            width: 80px; height: 80px; border: 2px solid #3a3a3c;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold; text-transform: uppercase;
            transition: all 0.15s ease;
        }

        /* COLORS */
        .tile.correct { background: #538d4e; border-color: #538d4e; color: white; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; color: white; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; color: white; }
        .tile.active { border-color: #818384; transform: scale(1.05); }

        #message { height: 40px; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .reset-btn { background: #d7dadc; color: #1a1a1b; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }

        #keyboard {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.keyboard-row {
    display: flex;
    margin-bottom: 8px;
}

.key {
    background: #818384;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 20px 16px;
    margin: 0 4px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
}

.big-key {
    padding: 15px 20px;
}

/* Coloring classes for the letters */
.correct { background: #538d4e !important; } /* Green */
.present { background: #b59f3b !important; } /* Yellow */
.absent { background: #3a3a3c !important; }  /* Gray */
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Forum</a>
    </nav>

    <div class="game-container">
        <div class="topic-header" id="topic-display">Topic: ???</div>
        <h1>Daily Wordle</h1>
        
        <div class="grid" id="board"></div>

        <div id="keyboard">
    <div class="keyboard-row">
        <button class="key" data-key="Q">Q</button>
        <button class="key" data-key="W">W</button>
        <button class="key" data-key="E">E</button>
        <button class="key" data-key="R">R</button>
        <button class="key" data-key="T">T</button>
        <button class="key" data-key="Y">Y</button>
        <button class="key" data-key="U">U</button>
        <button class="key" data-key="I">I</button>
        <button class="key" data-key="O">O</button>
        <button class="key" data-key="P">P</button>
    </div>
    <div class="keyboard-row">
        <button class="key" data-key="A">A</button>
        <button class="key" data-key="S">S</button>
        <button class="key" data-key="D">D</button>
        <button class="key" data-key="F">F</button>
        <button class="key" data-key="G">G</button>
        <button class="key" data-key="H">H</button>
        <button class="key" data-key="J">J</button>
        <button class="key" data-key="K">K</button>
        <button class="key" data-key="L">L</button>
    </div>
    <div class="keyboard-row">
        <button class="key big-key" data-key="ENTER">ENTER</button>
        <button class="key" data-key="Z">Z</button>
        <button class="key" data-key="X">X</button>
        <button class="key" data-key="C">C</button>
        <button class="key" data-key="V">V</button>
        <button class="key" data-key="B">B</button>
        <button class="key" data-key="N">N</button>
        <button class="key" data-key="M">M</button>
        <button class="key big-key" data-key="BACKSPACE">⌫</button>
    </div>
</div>

        <div id="message"></div>
        <button class="reset-btn" id="reset-btn" onclick="location.reload()">Play New Topic</button>
    </div>

    <script>
        // RANDOM TOPICS AND WORDS
        const gameData = [
            { topic: "Programming", word: "INPUT" },
            { topic: "Programming", word: "LOGIC" },
            { topic: "School", word: "STUDY" },
            { topic: "School", word: "GRADE" },
            { topic: "Technology", word: "CLOUD" },
            { topic: "Technology", word: "CYBER" },
            { topic: "General", word: "FORUM" },
            { topic: "General", word: "SHARE" }
        ];

        // Pick a random entry
        const randomConfig = gameData[Math.floor(Math.random() * gameData.length)];
        const SOLUTION = randomConfig.word;
        document.getElementById('topic-display').innerText = "Topic: " + randomConfig.topic;

        let currentGuess = "";
        let currentRow = 0;
        let gameOver = false;

        // Initialize Board (6 Tries)
        const board = document.getElementById('board');
        for (let i = 0; i < 6; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                rowDiv.appendChild(tile);
            }
            board.appendChild(rowDiv);
        }

        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            if (e.key === 'Enter') {
                if (currentGuess.length === 5) submitGuess();
            } else if (e.key === 'Backspace') {
                currentGuess = currentGuess.slice(0, -1);
                updateDisplay();
            } else if (currentGuess.length < 5 && /^[a-zA-Z]$/.test(e.key)) {
                currentGuess += e.key.toUpperCase();
                updateDisplay();
            }
        });

        function updateDisplay() {
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${currentRow}-${i}`);
                tile.innerText = currentGuess[i] || "";
                tile.classList.toggle('active', !!currentGuess[i]);
            }
        }

        function submitGuess() {
            const rowTiles = [];
            for (let i = 0; i < 5; i++) {
                rowTiles.push(document.getElementById(`tile-${currentRow}-${i}`));
            }

            const guessArray = currentGuess.split("");
            const solutionArray = SOLUTION.split("");
            const resultMsg = document.getElementById('message');

            // Check letters and apply colors
            guessArray.forEach((letter, i) => {
                if (letter === solutionArray[i]) {
                    rowTiles[i].classList.add('correct');
                } else if (solutionArray.includes(letter)) {
                    rowTiles[i].classList.add('present');
                } else {
                    rowTiles[i].classList.add('absent');
                }
            });

            if (currentGuess === SOLUTION) {
                resultMsg.innerText = "EXCELLENT! 🎉";
                resultMsg.style.color = "#538d4e";
                endGame();
            } else if (currentRow === 5) {
                resultMsg.innerText = "GAME OVER. Word was: " + SOLUTION;
                resultMsg.style.color = "#ff4500";
                endGame();
            } else {
                currentRow++;
                currentGuess = "";
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('reset-btn').style.display = "inline-block";
        }
    </script>
</body>
</html>
